<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Figma Designer Toolkit</title>
    <link rel="stylesheet" href="figma.css">
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'>
    <style>body{font-family:Arial;background:#f4f7fb}.hero{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;padding:80px 0;text-align:center}.card:hover{transform:translateY(-6px);transition:.3s}footer{background:#111827;color:#fff;padding:20px}</style></head><body><nav class='navbar bg-white shadow-sm'><div class='container'><a class='navbar-brand fw-bold'>🎨 Figma Toolkit</a></div></nav><section class='hero'><div class='container'><h1>Essential Tools for Figma Designers</h1><p>Color, AI, Logo & Background tools.</p></div></section><div class='container py-5'><div class='row g-4'>
<div class='col-md-3'><div class='card p-3'><h5>ColorZilla</h5><a class='btn btn-primary' href='https://www.colorzilla.com/' target='_blank'>Open</a></div></div>
<div class='col-md-3'><div class='card p-3'><h5>Remove.bg</h5><a class='btn btn-primary' href='https://remove.bg' target='_blank'>Open</a></div></div>
<div class='col-md-3'><div class='card p-3'><h5>Looka</h5><a class='btn btn-primary' href='https://looka.com' target='_blank'>Open</a></div></div>
<div class='col-md-3'><div class='card p-3'><h5>ChatGPT</h5><a class='btn btn-primary' href='https://chatgpt.com' target='_blank'>Open</a></div></div>
<div class='col-md-3'><div class='card p-3'><h5>Gemini</h5><a class='btn btn-primary' href='https://gemini.google.com' target='_blank'>Open</a></div></div>
<div class='col-md-3'><div class='card p-3'><h5>Claude</h5><a class='btn btn-primary' href='https://claude.ai' target='_blank'>Open</a></div></div>
<div class='col-md-3'><div class='card p-3'><h5>Adobe Color</h5><a class='btn btn-primary' href='https://color.adobe.com' target='_blank'>Open</a></div></div>
<div class='col-md-3'><div class='card p-3'><h5>Coolors</h5><a class='btn btn-primary' href='https://coolors.co' target='_blank'>Open</a></div></div>
</div></div>
<footer class='text-center'><p>© 2026 Figma Designer Toolkit</p></footer></body>
<script>// ==============================
// FIGMA TOOLKIT - MODERN JS
// ==============================

document.addEventListener("DOMContentLoaded", () => {

    // =========================
    // STICKY NAVBAR
    // =========================

    const navbar = document.querySelector(".navbar");

    window.addEventListener("scroll", () => {

        if (window.scrollY > 50) {

            navbar.classList.add("shadow");

        } else {

            navbar.classList.remove("shadow");

        }

    });


    // =========================
    // SCROLL PROGRESS BAR
    // =========================

    const progress = document.getElementById("progress-bar");

    if (progress) {

        window.addEventListener("scroll", () => {

            const scrollTop = document.documentElement.scrollTop;

            const scrollHeight =
                document.documentElement.scrollHeight -
                document.documentElement.clientHeight;

            const percent = (scrollTop / scrollHeight) * 100;

            progress.style.width = percent + "%";

        });

    }


    // =========================
    // SEARCH FILTER
    // =========================

    const searchInput = document.getElementById("searchInput");

    const cards = document.querySelectorAll(".tool-card");

    if (searchInput) {

        searchInput.addEventListener("keyup", () => {

            const value = searchInput.value.toLowerCase();

            cards.forEach(card => {

                const text = card.innerText.toLowerCase();

                card.style.display =
                    text.includes(value) ? "block" : "none";

            });

        });

    }


    // =========================
    // SMOOTH SCROLL
    // =========================

    document.querySelectorAll('a[href^="#"]').forEach(link => {

        link.addEventListener("click", e => {

            e.preventDefault();

            const target =
                document.querySelector(link.getAttribute("href"));

            if (target) {

                target.scrollIntoView({

                    behavior: "smooth"

                });

            }

        });

    });


    // =========================
    // BACK TO TOP
    // =========================

    const topBtn = document.getElementById("topBtn");

    if (topBtn) {

        window.addEventListener("scroll", () => {

            topBtn.style.display =
                window.scrollY > 300 ? "flex" : "none";

        });

        topBtn.addEventListener("click", () => {

            window.scrollTo({

                top: 0,

                behavior: "smooth"

            });

        });

    }


    // =========================
    // DARK MODE
    // =========================

    const darkBtn = document.getElementById("darkMode");

    if (darkBtn) {

        darkBtn.addEventListener("click", () => {

            document.body.classList.toggle("dark-mode");

            darkBtn.innerHTML =
                document.body.classList.contains("dark-mode")
                    ? "☀️"
                    : "🌙";

        });

    }


    // =========================
    // SCROLL REVEAL
    // =========================

    const reveal = document.querySelectorAll(".reveal");

    function revealOnScroll() {

        reveal.forEach(item => {

            const top = item.getBoundingClientRect().top;

            if (top < window.innerHeight - 100) {

                item.classList.add("active");

            }

        });

    }

    window.addEventListener("scroll", revealOnScroll);

    revealOnScroll();


    // =========================
    // TOOL CARD HOVER
    // =========================

    document.querySelectorAll(".tool-card").forEach(card => {

        card.addEventListener("mouseenter", () => {

            card.style.transform = "translateY(-8px) scale(1.02)";

        });

        card.addEventListener("mouseleave", () => {

            card.style.transform = "translateY(0) scale(1)";

        });

    });


    // =========================
    // DYNAMIC YEAR
    // =========================

    const year = document.getElementById("year");

    if (year) {

        year.textContent = new Date().getFullYear();

    }

});</script></html>
